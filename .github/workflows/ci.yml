name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt --no-deps || true

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app --select=E9,F --ignore=F401

      - name: Byte-compile check
        working-directory: backend
        run: python -m compileall -q app

  frontend:
    name: Frontend - lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://placeholder.invalid

  docker:
    name: Backend - build Docker image
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false # weights aren't needed just to prove the image builds in CI

      - name: Create dummy weight files so the Dockerfile COPY step succeeds
        run: |
          mkdir -p backend/model_weights
          touch backend/model_weights/cnn_model.pth
          touch backend/model_weights/resnet18_model.pth
          touch backend/model_weights/alexnet_model.pth

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: brain-stroke-agent-backend:ci
